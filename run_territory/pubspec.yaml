name: run_territory
description: "Running territory tracking app - claim land by running"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  sqflite: ^2.4.1
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0
  shared_preferences: ^2.3.3
  google_mobile_ads: ^5.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  macos:
    generate: false
